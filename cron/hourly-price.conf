# hourly-price.conf - 每小时价格采集任务配置
# 用途: BTC/ETH/SOL + VIX + 黄金 + 原油 每小时快照
# 频率: 每小时一次
#
# ============================================================
# Windows Task Scheduler 配置
# ============================================================
#
# 方法: PowerShell 创建每小时计划任务
#
# --- 创建每小时任务 (每小时的 :05 分执行，避免整点拥堵) ---
# $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-ExecutionPolicy Bypass -File 'C:\Users\Administrator\clawd\agents\workspace-gid\scripts\hourly-price-collector.ps1'"
# $trigger = New-ScheduledTaskTrigger -Once -At "05:00" -RepetitionInterval (New-TimeSpan -Hours 1) -RepetitionDuration ([TimeSpan]::MaxValue)
# $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable
# Register-ScheduledTask -TaskName "HourlyPriceCollector" -Action $action -Trigger $trigger -Settings $settings -Description "每小时采集BTC/ETH/SOL/黄金/原油价格快照" | Out-Null
#
# ============================================================
# Cron 表达式 (用于 WSL crontab 或兼容 cron 的环境)
# ============================================================
#
# 每小时执行 (UTC):
# 分  时  日  月  周  命令
# 5   *   *   *   *   pwsh -ExecutionPolicy Bypass -File /c/Users/Administrator/clawd/agents/workspace-gid/scripts/hourly-price-collector.ps1
#
# 北京时间每小时一次:
# 5   *   *   *   *   (WSL cron 本地时间为北京时间)
#
# ============================================================
# 采集时间表
# ============================================================
#
# 每小时 :05 执行 (例: 09:05, 10:05, 11:05...)
# 输出文件: data/prices/YYYY-MM-DD-HH.json
#
# 数据保留策略 (建议):
#   - 保留最近 30 天的小时快照
#   - 超过 30 天的数据可归档或清理
#   - 定期压缩减少存储
#
# ============================================================
# 查看和管理任务 (PowerShell)
# ============================================================
#
# 查看小时采集任务:
#   Get-ScheduledTask | Where-Object { $_.TaskName -like "*Hourly*" -or $_.TaskName -like "*Price*" }
#
# 手动运行:
#   Start-ScheduledTask -TaskName "HourlyPriceCollector"
#
# 停止任务:
#   Stop-ScheduledTask -TaskName "HourlyPriceCollector"
#
# 删除任务:
#   Unregister-ScheduledTask -TaskName "HourlyPriceCollector" -Confirm:$false
#
# ============================================================
# 验证采集结果
# ============================================================
#
# 查看最新快照:
#   Get-ChildItem "C:\Users\Administrator\clawd\agents\workspace-gid\data\prices" | Sort-Object LastWriteTime -Descending | Select-Object -First 5
#
# 查看快照内容:
#   Get-Content "C:\Users\Administrator\clawd\agents\workspace-gid\data\prices\2026-04-08-09.json"
#
# ============================================================
# 一键设置脚本 (setup-scheduled-tasks.ps1)
# ============================================================
#
# 创建计划任务后，可通过以下命令验证:
#   Get-ScheduledTaskInfo -TaskName "HourlyPriceCollector"
#
# 查看今日采集状态:
#   Get-Content "C:\Users\Administrator\clawd\agents\workspace-gid\memory\$(Get-Date -Format 'yyyy-MM-dd').md" | Select-String "hourly"

# ai-news.conf - AI/ML新闻定时采集任务配置
# 用途: Hacker News Top 30 + GitHub Trending 每6小时采集
# 频率: 00:00 / 06:00 / 12:00 / 18:00 (北京时间)
#
# ============================================================
# Windows Task Scheduler
# ============================================================
#
# 任务名: AINewsCollector_6h
# 执行账户: Administrator (Interactive)
# RunLevel: Highest
# 状态: Ready
# 下次运行: 2026-04-24 18:00:00
#
# ============================================================
# 实现方式
# ============================================================
#
# 采用 wrapper 脚本方式解决 Windows 任务计划程序直接调用 PowerShell 脚本
# 的退出码异常问题 (0x80070002 / 0x800710E0)。
#
# 主脚本: run-ai-news-wrapper.ps1
#   - 调用 fetch-hn-top30.ps1 (HN Top 30)
#   - 调用 gh-trending-v3.ps1 (GitHub Trending)
#   - 日志: data/ai/cron_wrapper.log
#
# 创建任务命令 (参考):
#   .\scripts\setup-ai-news-cron.ps1
#
# ============================================================
# 采集时间表
# ============================================================
#
# 00:00 (北京时间) - 午夜采集
# 06:00 (北京时间) - 晨间采集
# 12:00 (北京时间) - 午间采集
# 18:00 (北京时间) - 晚间采集
#
# 输出文件:
#   data/tech/hacker-news_latest.json   - HN数据 (每次更新)
#   data/ai/hacker-news_latest.json     - HN数据副本
#   data/ai/github-trending_latest.json - GH Trending (每次更新)
#   data/ai/github-trending-YYYY-MM-DD.md - GH 归档
#   data/ai/hn-top30-YYYY-MM-DD.json   - HN 归档
#
# ============================================================
# 查看和管理
# ============================================================
#
# 查看任务状态:
#   Get-ScheduledTaskInfo -TaskName "AINewsCollector_6h"
#
# 查看采集日志:
#   Get-Content "C:\Users\Administrator\clawd\agents\workspace-gid\data\ai\cron_wrapper.log" -Tail 15
#
# 手动触发采集:
#   Start-ScheduledTask -TaskName "AINewsCollector_6h"
#
# 删除任务:
#   Unregister-ScheduledTask -TaskName "AINewsCollector_6h" -Confirm:$false
#
# ============================================================
# 已知问题
# ============================================================
#
# 1. gh-trending-v3.ps1 依赖浏览器访问 GitHub API
#    - 在非交互环境下数据可能不完整
#    - GitHub API 被GWF屏蔽，无法用 curl/pwsh 直接访问
#    - 建议: 后续考虑用镜像网站或RSS方式补充
#
# 2. GitHub Trending 历史数据较少
#    - github-trending-history.json 仅4条记录
#    - 因GH采集本身数据量有限
#
# ============================================================
# 相关任务
# ============================================================
#
# HourlyPriceCollector  - 每小时采集加密货币价格
# DailyCollector_AM/PM   - 每日宏观数据 + AI新闻 + GH Trending
# AINewsCollector_6h     - AI新闻专项采集 (每6小时)
# daily-collection.conf - 每日定时采集任务配置
# 用途: 宏观数据(黄金/原油/VIX/F&G) + AI新闻 + GitHub Trending
# 频率: 每日 08:00 / 20:00 (北京时间)
#
# ============================================================
# Windows Task Scheduler 配置
# ============================================================
#
# 方法1: 使用 PowerShell 创建计划任务
#
# --- 创建每日08:00任务 ---
# $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-ExecutionPolicy Bypass -File 'C:\Users\Administrator\clawd\agents\workspace-gid\scripts\daily-collector.ps1'"
# $trigger = New-ScheduledTaskTrigger -Daily -At "08:00"
# $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable
# Register-ScheduledTask -TaskName "DailyCollector_AM" -Action $action -Trigger $trigger -Settings $settings -Description "每日08:00采集宏观数据+AI新闻+GitHub Trending" | Out-Null
#
# --- 创建每日20:00任务 ---
# $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-ExecutionPolicy Bypass -File 'C:\Users\Administrator\clawd\agents\workspace-gid\scripts\daily-collector.ps1'"
# $trigger = New-ScheduledTaskTrigger -Daily -At "20:00"
# Register-ScheduledTask -TaskName "DailyCollector_PM" -Action $action -Trigger $trigger -Settings $settings -Description "每日20:00采集宏观数据+AI新闻+GitHub Trending" | Out-Null
#
# --- 一键创建所有每日任务 ---
# .\scripts\setup-scheduled-tasks.ps1
#
# ============================================================
# Cron 表达式 (用于 WSL crontab 或兼容 cron 的环境)
# ============================================================
#
# 北京时间 = UTC+8，以下转换为 UTC
# 08:00 北京 = 00:00 UTC
# 20:00 北京 = 12:00 UTC
#
# 分  时  日  月  周  命令
# 0   0   *   *   *   pwsh -ExecutionPolicy Bypass -File /c/Users/Administrator/clawd/agents/workspace-gid/scripts/daily-collector.ps1
# 0   12  *   *   *   pwsh -ExecutionPolicy Bypass -File /c/Users/Administrator/clawd/agents/workspace-gid/scripts/daily-collector.ps1
#
# ============================================================
# 采集时间表
# ============================================================
#
# 08:00 (北京时间)  - 晨间宏观 + AI新闻 + GitHub Trending
# 20:00 (北京时间)  - 晚间宏观 + AI新闻 + GitHub Trending
#
# 输出文件:
#   data/macro-YYYY-MM-DD.json         - 每日宏观数据快照
#   data/ai/ai-news-YYYY-MM-DD.json    - 每日AI新闻归档
#   data/github-trending-history.json - GitHub Trending历史 (追加)
#
# ============================================================
# 查看和管理任务 (PowerShell)
# ============================================================
#
# 查看所有每日采集任务:
#   Get-ScheduledTask | Where-Object { $_.TaskName -like "*Daily*" -or $_.TaskName -like "*Collector*" }
#
# 查看任务运行历史:
#   Get-WinEvent -LogName Microsoft-Windows-TaskScheduler/Operational | Where-Object { $_.Message -like "*DailyCollector*" } | Select-Object -First 10 TimeCreated, Message
#
# 手动运行任务:
#   Start-ScheduledTask -TaskName "DailyCollector_AM"
#
# 删除任务:
#   Unregister-ScheduledTask -TaskName "DailyCollector_AM" -Confirm:$false
#
# ============================================================
# 日志查看
# ============================================================
#
# 采集日志: memory/YYYY-MM-DD.md
# Git推送日志: memory/YYYY-MM-DD.md (内含推送记录)
#
# 快速查看今日采集状态:
#   Get-Content "C:\Users\Administrator\clawd\agents\workspace-gid\memory\$(Get-Date -Format 'yyyy-MM-dd').md"

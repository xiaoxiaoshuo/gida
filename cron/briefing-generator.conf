# briefing-generator.conf - 简报/DAILY 定时生成任务配置
# 用途: 每 4 小时生成一次中场简报 + DAILY 增量
# 频率: 06:00 / 10:00 / 14:00 / 18:00 / 22:00 (北京时间)
#
# ============================================================
# Windows Task Scheduler
# ============================================================
#
# 任务名: BriefingGenerator_4h
# 执行账户: Administrator (Interactive)
# RunLevel: Highest
# 状态: TODO-创建
#
# 创建命令:
#   $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-ExecutionPolicy Bypass -File 'C:\Users\Administrator\clawd\agents\workspace-gid\scripts\briefing-generator.ps1'"
#   $trigger = New-ScheduledTaskTrigger -Once -At "06:00" -RepetitionInterval (New-TimeSpan -Hours 4) -RepetitionDuration ([TimeSpan]::MaxValue)
#   $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable
#   Register-ScheduledTask -TaskName "BriefingGenerator_4h" -Action $action -Trigger $trigger -Settings $settings -Description "每4小时生成一次情报简报和DAILY增量" -RunLevel Highest | Out-Null
#
# ============================================================
# 简报生成时间表
# ============================================================
#
# 06:00 GMT+8 - 晨间简报 (前夜美股 + 早盘加密)
# 10:00 GMT+8 - 早间简报 (亚盘 + 欧洲盘前)
# 14:00 GMT+8 - 午间简报 (欧洲盘 + 美股盘前)
# 18:00 GMT+8 - 下午简报 (美股盘中)
# 22:00 GMT+8 - 晚间简报 (美股盘后 + 加密)
#
# 输出文件:
#   briefings/YYYY-MM-DD-v{N}-{HHMM}.md  - 简报 (BLUF + 表格 + 行动)
#   DAILY/YYYY-MM-DD-v{N}-{HHMM}.md     - DAILY 增量 (覆盖期标注)
#
# ============================================================
# 数据源 (按优先级)
# ============================================================
#
# 1. data/market/prices_latest.json (P0) - 实时价格
# 2. data/tech/hacker-news_latest.json (P1) - HN 30条
# 3. data/ai/ai-news_latest.json (P1) - GitHub Trending
# 4. data/geo/* (P2) - 地缘快照
# 5. memory/YYYY-MM-DD.md (P2) - 当日日志
# 6. ALERTS/* (P2) - 当日警报
# 7. INTEL/* (P2) - 子智能体分析
#
# ============================================================
# 简报模板 (与 v27/v28 对齐)
# ============================================================
#
# # 情报简报 v{N} — YYYY-MM-DD HH:MM GMT+8
#
# ## 🎯 BLUF (5 行)
# ## 📊 市场快照 (表格)
# ## 🔥 P0 信号 (2-3 个)
# ## 📈 信号强度评估
# ## 🌐 跨域关联
# ## ⏰ 时间线
# ## 📋 行动建议
#
# ============================================================
# 已知问题
# ============================================================
#
# 1. 简报生成依赖主代理 (LLM) 调度
#    - 当前 cron 只能调用 PowerShell 脚本
#    - 需要 agent 主动触发或使用模板填充
#    - 解决方案: 触发 heartbeat cron 同时生成简报
#
# 2. 子智能体深度分析需要时间
#    - 派出后 2-5 分钟回报
#    - 简报可先落基础版，深度信号由 agent 后续补充
#
# ============================================================
# 相关任务
# ============================================================
#
# HourlyPriceCollector  - 每小时价格
# AINewsCollector_6h     - 每 6 小时 AI/ML 新闻
# HeartbeatSelfcheck     - 每小时心跳自检
# BriefingGenerator_4h   - 【本任务】每 4 小时简报

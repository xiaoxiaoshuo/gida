# GitHub Trending Cron 配置
# 每4小时自动采集GitHub Trending热榜数据
# Cron表达式: 0 */4 * * *
# 触发时间: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 (UTC+8)

name: github-trending
description: 每4小时采集GitHub Trending热榜
cron: "0 */4 * * *"
enabled: true
script: scripts/gh-trending-v3.ps1
output_dir: data/ai
output_files:
  - github-trending-{date}.json
  - github-trending_latest.json
alerts:
  - hn-alerts-{date}.json
